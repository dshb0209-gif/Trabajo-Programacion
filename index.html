<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primera Página - Daniel</title>
    <style>
        /* Aquí controlamos cómo se ve todo (colores y tamaños) */
        body {
            background-color: #1a1a1a; /* Color de fondo oscuro */
            color: white;              /* Color de la letra */
            font-family: sans-serif;   /* Tipo de letra sencilla */
            text-align: center;        /* Todo el texto centrado */
            padding: 50px;
        }

        /* Estilo para las cajas de las imágenes */
        .caja-imagen {
            display: inline-block;
            margin: 20px;
            padding: 10px;
            border: 5px solid #00d4ff; /* Borde de color azul */
            border-radius: 15px;      /* Bordes redondeados */
            width: 200px;
        }

        img {
            width: 80%;             /* La imagen se ajusta a la caja */
            border-radius: 10px;
        }

        a {
            color: #black;         /* Color de los enlaces */
            text-decoration: none;  /* Quita la raya debajo del texto */
            font-weight: bold;
        }
	

    </style>
</head>
<body>

    <h1>MI PROYECTO WEB</h1>
    <p>Hola, soy Daniel. Haz clic en las imágenes para navegar.</p>

 
	<div class="caja-imagen"; style="background-color:#957588" id="caja nasa">
        <a href="https://www.nasa.gov">
            <img src="imagen1.jpeg">
            <p>Ir al Sitio 1</p>
        </a>
    </div>

    <div class="caja-imagen"; style="background-color:#817594" id="caja wiki">
        <a href="https://es.wikipedia.org">
            <img src="imagen2.jpeg">
            <p>Ir al Sitio 2</p>
        </a>
    </div>

    <div class="caja-imagen"; style="background-color:#159126" id="caja maps">
        <a href="https://www.google.com/maps">
            <img src="imagen3.jpeg">
            <p>Ir al Sitio 3</p>
        </a>
    </div>

    <div class="caja-imagen"; style="background-color:#159164" id="caja hoja">
        <a href="https://drive.google.com/file/d/1cqUW_248nV9WDvSRXfZCgMGxsX_EEg2h/view?usp=sharing">
            <img src="imagen4.jpeg">
            <p>Mi Hoja de Vida</p>
        </a>
    </div>

</body>
</html>
